<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Mailer WebApp</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/static/css/style.css" rel="stylesheet">
</head>

<body>
    <div class="container-fluid py-3 h-100 d-flex flex-column">
        <header class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="h4 mb-0 text-primary fw-bold">Smart Mailer <span
                    class="badge bg-secondary fs-6 rounded-pill">App</span></h2>
            <div class="d-flex align-items-center">
                <div id="user-info"
                    class="me-3 d-none align-items-center bg-white border rounded-pill px-2 py-1 shadow-sm">
                    <img id="user-avatar" src="" class="rounded-circle me-2" width="24" height="24" alt="Avatar">
                    <span id="user-name" class="fw-medium text-secondary small" style="margin-right: 4px;"></span>
                </div>
                <a id="btn-login" href="/login" class="btn btn-outline-danger btn-sm me-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor"
                        class="bi bi-google mb-1 me-1" viewBox="0 0 16 16">
                        <path
                            d="M15.545 6.558a9.42 9.42 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.689 7.689 0 0 1 5.352 2.082l-2.284 2.284A4.347 4.347 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.792 4.792 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.702 3.702 0 0 0 1.599-2.431H8v-3.08h7.545z" />
                    </svg> Google Girişi
                </a>
                <a id="btn-logout" href="/logout" class="btn btn-outline-secondary btn-sm me-2 d-none">Çıkış</a>

                <button class="btn btn-outline-secondary btn-sm" onclick="downloadTemplate()">📥 Şablon İndir</button>
                <button class="btn btn-outline-primary btn-sm ms-2" onclick="openTemplatesModal()">📂
                    Şablonlarım</button>
                <button class="btn btn-outline-dark btn-sm ms-2" onclick="openSmtpModal()">⚙️ Ayarlar</button>
            </div>
        </header>

        <div class="row flex-grow-1 gy-4">
            <!-- Sol Panel: Veri & Excel -->
            <div class="col-12 col-md-5 d-flex flex-column">
                <div class="card shadow-sm flex-grow-1 h-100">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-semibold text-secondary">1. Hedef Kitle (Excel)</h5>
                        <div class="upload-area p-4 border border-2 border-dashed rounded text-center mb-3 mt-2"
                            id="drop-zone">
                            <input type="file" id="excel-file" class="d-none" accept=".xlsx, .xls">
                            <label for="excel-file" class="btn btn-light btn-sm mb-2 shadow-sm text-primary fw-medium"
                                style="cursor: pointer;">Excel Seç veya Sürükle</label>
                            <p class="text-muted small mb-0">Sadece .xlsx dosyaları</p>
                        </div>
                        <div class="table-responsive flex-grow-1 border rounded bg-white"
                            style="max-height: 50vh; overflow-y: auto;">
                            <table class="table table-sm table-hover table-striped mb-0 text-secondary" id="data-table">
                                <thead class="table-light sticky-top">
                                    <tr id="table-head">
                                        <th class="ps-3 py-2 fw-medium">Lütfen Excel Yükleyin</th>
                                    </tr>
                                </thead>
                                <tbody id="table-body">
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Sağ Panel: Editör -->
            <div class="col-12 col-md-7 d-flex flex-column">
                <div class="card shadow-sm flex-grow-1 h-100 bg-white">
                    <div class="card-body d-flex flex-column">
                        <h5 class="card-title fw-semibold text-secondary">2. Mail Tasarımcısı</h5>

                        <div class="mb-3 mt-2 d-flex flex-wrap gap-2" id="tag-buttons">
                            <!-- Tags will be dynamically populated -->
                            <button class="btn btn-sm btn-outline-secondary disabled">Değişkenler bekleniyor...</button>
                        </div>

                        <input type="text" id="mail-subject"
                            class="form-control mb-3 shadow-none border-secondary-subtle" placeholder="Mail Konusu">

                        <textarea id="mail-editor"
                            class="form-control flex-grow-1 mb-3 shadow-none border-secondary-subtle"
                            style="min-height: 250px; resize: none;"
                            placeholder="Sayın {{Yetkili}},&#10;&#10;{{Sirket_Adi}} için özel teklifimiz mektubun devamındadır..."></textarea>

                        <div class="d-flex justify-content-between align-items-center">
                            <button class="btn btn-outline-success" onclick="saveCurrentTemplate()">💾 Şablonu
                                Kaydet</button>
                            <button class="btn btn-primary px-4 fw-medium shadow-sm" onclick="startSending()">🚀
                                Gönderimi Başlat</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Templates Modal -->
    <div class="modal fade" id="templatesModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light">
                    <h5 class="modal-title fw-semibold">Kaydedilmiş Şablonlar</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-0">
                    <ul class="list-group list-group-flush" id="templates-list">
                        <!-- Templates will be listed here -->
                    </ul>
                </div>
            </div>
        </div>
    </div>

    <!-- SMTP Settings Modal -->
    <div class="modal fade" id="smtpModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header bg-light">
                    <h5 class="modal-title fw-semibold">⚙️ SMTP Mail Ayarları</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="alert alert-info py-2" style="font-size: 0.85rem;">
                        Giden e-postalarınız burada belirttiğiniz gerçek sunucu üzerinden atılacaktır. Bilgiler sadece
                        tarayıcınızda (yerel) saklanır.
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium small">SMTP Sunucusu</label>
                        <input type="text" id="smtp-server" class="form-control form-control-sm"
                            placeholder="Örn: smtp.yandex.com.tr">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium small">SMTP Portu</label>
                        <input type="number" id="smtp-port" class="form-control form-control-sm"
                            placeholder="Genellikle 465 (SSL) veya 587 (TLS)">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium small">E-Posta Adresi (Kullanıcı)</label>
                        <input type="email" id="smtp-user" class="form-control form-control-sm"
                            placeholder="mail@site.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-medium small">Şifre / Uygulama Şifresi</label>
                        <input type="password" id="smtp-password" class="form-control form-control-sm"
                            placeholder="Şifreniz">
                    </div>
                </div>
                <div class="modal-footer bg-light">
                    <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">İptal</button>
                    <button type="button" class="btn btn-primary btn-sm" onclick="saveSmtpSettings()">Kaydet ve
                        Kapat</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/main.js"></script>
</body>

</html>
